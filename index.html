<!DOCTYPE html>
<html lang="en" data-theme="custom">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iRhysBradbury</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [data-theme="custom"] {
      --color-base-100: oklch(10% 0 0);
      --color-base-200: oklch(13% 0.01 240);
      --color-base-300: oklch(17% 0.01 240);
      --color-base-content: oklch(90% 0 0);
      --color-primary: oklch(82% 0.2 155);
      --color-primary-content: oklch(10% 0 0);
      --color-neutral: oklch(20% 0.01 240);
      --color-neutral-content: oklch(70% 0 0);
      --rounded-box: 0.75rem;
      --rounded-btn: 0.5rem;
      --rounded-badge: 1rem;
    }

    body {
      background:
        radial-gradient(ellipse at 15% 0%, rgba(0,230,118,0.05) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 100%, rgba(99,102,241,0.04) 0%, transparent 55%),
        oklch(10% 0 0);
      min-height: 100vh;
    }

    .org-avatar {
      transition: filter 0.2s, transform 0.2s;
    }
    .org-avatar .avatar {
      transition: opacity 0.2s, filter 0.2s, transform 0.2s;
      filter: grayscale(50%);
      opacity: 0.6;
    }
    .org-avatar:hover .avatar {
      filter: grayscale(0%);
      opacity: 1;
      transform: scale(1.12);
    }
  </style>
</head>
<body class="flex flex-col">

  <main class="flex-1 flex flex-col items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm flex flex-col gap-3">

      <!-- Header card -->
      <div class="card bg-base-200 border border-white/[0.07] shadow-xl">
        <div class="card-body p-5 flex-row items-center gap-4">
          <div class="avatar">
            <div class="w-14 rounded-full ring-2 ring-[#00e676] ring-offset-2 ring-offset-base-200">
              <img src="https://github.com/iRhysBradbury.png" alt="iRhysBradbury" />
            </div>
          </div>
          <div>
            <h1 class="text-base font-medium text-base-content leading-snug">iRhysBradbury</h1>
            <p class="text-xs text-[#00e676] mb-2 tracking-wide">Senior Software Engineer</p>
            <span class="badge badge-outline badge-sm text-base-content/40 border-white/10 font-normal">UTC</span>
          </div>
        </div>
      </div>

      <!-- Contributions card -->
      <div class="card bg-base-200 border border-white/[0.07] shadow-xl">
        <div class="card-body p-5">
          <p class="text-xs text-base-content/40 uppercase tracking-widest mb-3">Contributions</p>
          <div class="flex flex-wrap gap-3">
            <a href="https://github.com/sky-uk" target="_blank" rel="noopener" class="tooltip tooltip-bottom org-avatar" data-tip="sky-uk">
              <div class="avatar"><div class="w-11 rounded-full border border-white/10"><img src="https://github.com/sky-uk.png" alt="sky-uk" /></div></div>
            </a>
            <a href="https://github.com/ClearScore" target="_blank" rel="noopener" class="tooltip tooltip-bottom org-avatar" data-tip="ClearScore">
              <div class="avatar"><div class="w-11 rounded-full border border-white/10"><img src="https://github.com/ClearScore.png" alt="ClearScore" /></div></div>
            </a>
            <a href="https://github.com/telegraph" target="_blank" rel="noopener" class="tooltip tooltip-bottom org-avatar" data-tip="telegraph">
              <div class="avatar"><div class="w-11 rounded-full border border-white/10"><img src="https://github.com/telegraph.png" alt="telegraph" /></div></div>
            </a>
            <a href="https://github.com/otrl" target="_blank" rel="noopener" class="tooltip tooltip-bottom org-avatar" data-tip="otrl">
              <div class="avatar"><div class="w-11 rounded-full border border-white/10"><img src="https://github.com/otrl.png" alt="otrl" /></div></div>
            </a>
            <a href="https://github.com/ONSdigital" target="_blank" rel="noopener" class="tooltip tooltip-bottom org-avatar" data-tip="ONSdigital">
              <div class="avatar"><div class="w-11 rounded-full border border-white/10"><img src="https://github.com/ONSdigital.png" alt="ONSdigital" /></div></div>
            </a>
            <a href="https://github.com/outworkers" target="_blank" rel="noopener" class="tooltip tooltip-bottom org-avatar" data-tip="outworkers">
              <div class="avatar"><div class="w-11 rounded-full border border-white/10"><img src="https://github.com/outworkers.png" alt="outworkers" /></div></div>
            </a>
            <a href="https://github.com/iRhysBradbury" target="_blank" rel="noopener" class="tooltip tooltip-bottom org-avatar" data-tip="iRhysBradbury">
              <div class="avatar"><div class="w-11 rounded-full border border-white/10"><img src="https://github.com/iRhysBradbury.png" alt="iRhysBradbury" /></div></div>
            </a>
            <a href="https://www.linkedin.com/in/rhys-bradbury/" target="_blank" rel="noopener" class="tooltip tooltip-bottom org-avatar" data-tip="LinkedIn">
              <div class="avatar"><div class="w-11 rounded-full border border-white/10 bg-[#0a66c2] flex items-center justify-center">
                <img src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/linkedin.svg" alt="LinkedIn" class="w-6 h-6 invert" />
              </div></div>
            </a>
          </div>
        </div>
      </div>

    </div>
  </main>

  <footer class="border-t border-white/[0.07] px-6 py-3 flex justify-between text-xs text-base-content/30">
    <span>iRhysBradbury &copy; 2026</span>
    <span>build: <span id="hash">--</span></span>
  </footer>

  <script>
    document.getElementById('hash').textContent = Math.random().toString(36).slice(2, 9);
  </script>
</body>
</html>
